<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Antal Family Meals</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #F7F3EE;
    --warm-white: #FDFAF7;
    --ink: #1C1917;
    --muted: #78716C;
    --accent: #C2410C;
    --accent-light: #FED7AA;
    --green: #3D6B4F;
    --green-light: #D1FAE5;
    --border: #E5DDD5;
    --card: #FFFFFF;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--cream);
    color: var(--ink);
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    min-height: 100vh;
  }

  /* Header */
  header {
    background: var(--ink);
    padding: 28px 24px 24px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  header::before {
    content: '';
    position: absolute;
    top: -40px; right: -40px;
    width: 180px; height: 180px;
    border-radius: 50%;
    background: rgba(194,65,12,0.15);
  }
  header::after {
    content: '';
    position: absolute;
    bottom: -60px; left: -20px;
    width: 140px; height: 140px;
    border-radius: 50%;
    background: rgba(61,107,79,0.12);
  }
  .header-eyebrow {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--accent-light);
    margin-bottom: 8px;
    position: relative;
    z-index: 1;
  }
  header h1 {
    font-family: 'Playfair Display', serif;
    font-size: 28px;
    font-weight: 400;
    color: var(--warm-white);
    line-height: 1.2;
    position: relative;
    z-index: 1;
  }
  header h1 em { font-style: italic; color: var(--accent-light); }
  .header-sub {
    font-size: 12px;
    color: rgba(255,255,255,0.4);
    margin-top: 6px;
    position: relative;
    z-index: 1;
  }

  /* Views */
  main { max-width: 480px; margin: 0 auto; }
  .view { display: none; padding: 24px 20px; }
  .view.active { display: block; animation: slideUp 0.25s ease; }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Action buttons */
  .actions {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 24px;
  }
  .action-btn {
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: 16px;
    padding: 20px 16px;
    cursor: pointer;
    transition: all 0.2s ease;
    text-align: left;
    display: flex;
    flex-direction: column;
    gap: 8px;
    -webkit-tap-highlight-color: transparent;
  }
  .action-btn:active { transform: scale(0.97); }
  .action-btn:hover { border-color: var(--accent); box-shadow: 0 4px 20px rgba(194,65,12,0.1); }
  .btn-icon { font-size: 28px; line-height: 1; }
  .btn-label {
    font-family: 'Playfair Display', serif;
    font-size: 15px;
    font-weight: 600;
    color: var(--ink);
    line-height: 1.2;
  }
  .btn-desc { font-size: 11px; color: var(--muted); font-weight: 400; line-height: 1.4; }
  .action-btn.primary { background: var(--ink); border-color: var(--ink); }
  .action-btn.primary .btn-label { color: var(--warm-white); }
  .action-btn.primary .btn-desc { color: rgba(255,255,255,0.5); }

  /* Custom input */
  .custom-input-section {
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: 16px;
    padding: 16px;
    margin-bottom: 24px;
  }
  .custom-label {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
    display: block;
  }
  .custom-input-row { display: flex; gap: 10px; align-items: flex-end; }
  textarea {
    flex: 1;
    background: var(--cream);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 10px 12px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 300;
    color: var(--ink);
    resize: none;
    height: 52px;
    outline: none;
    transition: border-color 0.2s;
    line-height: 1.5;
  }
  textarea:focus { border-color: var(--accent); }
  textarea::placeholder { color: var(--muted); font-style: italic; }
  .send-btn {
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 10px;
    width: 44px;
    height: 52px;
    cursor: pointer;
    font-size: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    flex-shrink: 0;
  }
  .send-btn:hover { background: #9a3412; }
  .send-btn:active { transform: scale(0.95); }

  /* General response card */
  .response-card {
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    display: none;
  }
  .response-card.visible { display: block; animation: slideUp 0.3s ease; }
  .response-header {
    background: var(--ink);
    padding: 12px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .response-title {
    font-family: 'Playfair Display', serif;
    font-size: 13px;
    color: var(--warm-white);
    font-style: italic;
  }
  .response-actions { display: flex; gap: 8px; }
  .resp-action-btn {
    background: rgba(255,255,255,0.1);
    border: none;
    border-radius: 6px;
    color: rgba(255,255,255,0.7);
    font-size: 11px;
    font-family: 'DM Sans', sans-serif;
    padding: 4px 8px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .resp-action-btn:hover { background: rgba(255,255,255,0.2); color: white; }
  .response-body {
    padding: 20px;
    font-size: 14px;
    line-height: 1.75;
    color: var(--ink);
    max-height: 60vh;
    overflow-y: auto;
  }

  /* ── MEAL PLAN VIEW ─────────────────────────────────── */
  .plan-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 20px;
  }
  .plan-title {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    font-weight: 600;
  }
  .plan-subtitle { font-size: 12px; color: var(--muted); margin-top: 3px; }

  .meal-card {
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: 14px;
    margin-bottom: 12px;
    overflow: hidden;
    transition: border-color 0.2s, box-shadow 0.2s;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .meal-card:hover { border-color: var(--accent); box-shadow: 0 4px 16px rgba(194,65,12,0.08); }
  .meal-card:active { transform: scale(0.99); }

  .meal-card-inner {
    padding: 16px;
    display: flex;
    align-items: flex-start;
    gap: 14px;
  }
  .meal-day {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
    min-width: 38px;
    margin-top: 3px;
    flex-shrink: 0;
  }
  .meal-info { flex: 1; min-width: 0; }
  .meal-name {
    font-family: 'Playfair Display', serif;
    font-size: 16px;
    font-weight: 600;
    color: var(--ink);
    line-height: 1.3;
    margin-bottom: 4px;
  }
  .meal-key-ingredients {
    font-size: 12px;
    color: var(--muted);
    line-height: 1.4;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .meal-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 7px; }
  .meal-tag {
    font-size: 10px;
    font-weight: 500;
    padding: 2px 8px;
    border-radius: 20px;
    background: var(--cream);
    color: var(--muted);
    border: 1px solid var(--border);
  }
  .meal-tag.fish { background: #EFF6FF; color: #1D4ED8; border-color: #BFDBFE; }
  .meal-tag.veggie { background: var(--green-light); color: var(--green); border-color: #A7F3D0; }
  .meal-arrow {
    color: var(--muted);
    font-size: 18px;
    margin-top: 1px;
    flex-shrink: 0;
    transition: transform 0.2s, color 0.2s;
  }
  .meal-card:hover .meal-arrow { transform: translateX(3px); color: var(--accent); }

  .leftover-card {
    background: #FFFBEB;
    border: 1.5px solid #FDE68A;
    border-radius: 14px;
    padding: 14px 16px;
    margin-bottom: 12px;
    display: flex;
    gap: 12px;
    align-items: flex-start;
  }
  .leftover-icon { font-size: 20px; flex-shrink: 0; margin-top: 1px; }
  .leftover-label {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: #92400E;
    margin-bottom: 3px;
  }
  .leftover-name {
    font-family: 'Playfair Display', serif;
    font-size: 14px;
    font-weight: 600;
    color: var(--ink);
  }

  .plan-actions {
    display: flex;
    gap: 10px;
    margin-top: 20px;
  }
  .plan-cta {
    flex: 1;
    padding: 14px;
    border-radius: 12px;
    border: none;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    transition: all 0.2s;
    -webkit-tap-highlight-color: transparent;
  }
  .plan-cta.primary { background: var(--ink); color: white; }
  .plan-cta.primary:hover { background: #374151; }
  .plan-cta.secondary { background: var(--card); color: var(--ink); border: 1.5px solid var(--border); }
  .plan-cta.secondary:hover { border-color: var(--accent); }

  /* ── RECIPE DETAIL VIEW ─────────────────────────────── */
  .back-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    font-weight: 500;
    color: var(--muted);
    background: none;
    border: none;
    cursor: pointer;
    padding: 0;
    margin-bottom: 20px;
    transition: color 0.2s;
    -webkit-tap-highlight-color: transparent;
  }
  .back-btn:hover { color: var(--accent); }

  .recipe-day-label {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
  }
  .recipe-title {
    font-family: 'Playfair Display', serif;
    font-size: 24px;
    font-weight: 600;
    line-height: 1.2;
    margin-bottom: 20px;
  }
  .recipe-body {
    font-size: 14px;
    line-height: 1.8;
    color: var(--ink);
  }
  .recipe-body h3 {
    font-family: 'Playfair Display', serif;
    font-size: 16px;
    font-weight: 600;
    margin: 20px 0 8px;
    color: var(--ink);
  }
  .recipe-body h3:first-child { margin-top: 0; }
  .recipe-body p { margin-bottom: 10px; }
  .recipe-body ul, .recipe-body ol { padding-left: 20px; margin-bottom: 12px; }
  .recipe-body li { margin-bottom: 6px; }
  .recipe-body strong { font-weight: 500; color: var(--accent); }

  .recipe-detail-actions {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-top: 28px;
    padding-top: 20px;
    border-top: 1.5px solid var(--border);
  }
  .recipe-action-btn {
    width: 100%;
    padding: 15px;
    border-radius: 12px;
    border: none;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    transition: all 0.2s;
    -webkit-tap-highlight-color: transparent;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .recipe-action-btn.swap {
    background: var(--cream);
    color: var(--ink);
    border: 1.5px solid var(--border);
  }
  .recipe-action-btn.swap:hover { border-color: var(--accent); background: white; }
  .recipe-action-btn.keep { background: var(--ink); color: white; }
  .recipe-action-btn.keep:hover { background: #374151; }

  /* Loading */
  .loading {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 24px 0;
    color: var(--muted);
    font-size: 13px;
    font-style: italic;
  }
  .loading-dots { display: flex; gap: 4px; }
  .loading-dots span {
    width: 6px; height: 6px;
    background: var(--accent);
    border-radius: 50%;
    animation: bounce 1.2s infinite;
  }
  .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
  .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
    30% { transform: translateY(-6px); opacity: 1; }
  }

  /* Error */
  .error-msg {
    background: #FEF2F2;
    border: 1px solid #FECACA;
    border-radius: 10px;
    padding: 12px 16px;
    font-size: 13px;
    color: #991B1B;
  }

  /* Misc */
  .pantry-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--green-light);
    color: var(--green);
    font-size: 11px;
    font-weight: 500;
    padding: 4px 10px;
    border-radius: 20px;
    margin-bottom: 20px;
  }
  footer {
    text-align: center;
    padding: 20px;
    font-size: 11px;
    color: var(--muted);
  }
</style>
</head>
<body>

<header>
  <div class="header-eyebrow">Antal Household</div>
  <h1>Family <em>Meals</em></h1>
  <div class="header-sub">Pescatarian · Oak Park, IL</div>
</header>

<main>

  <!-- ── HOME VIEW ──────────────────────────────────────── -->
  <div class="view active" id="view-home">
    <div class="pantry-badge"><span>🥦</span> Pantry-first planning</div>

    <div class="actions">
      <button class="action-btn primary" onclick="planWeek()">
        <span class="btn-icon">🗓</span>
        <div>
          <div class="btn-label">Plan This Week</div>
          <div class="btn-desc">3 cook nights + 2 leftover nights</div>
        </div>
      </button>
      <button class="action-btn" onclick="sendRequest('grocery')">
        <span class="btn-icon">🛒</span>
        <div>
          <div class="btn-label">Grocery List</div>
          <div class="btn-desc">Based on current meal plan</div>
        </div>
      </button>
      <button class="action-btn" onclick="sendRequest('pantry')">
        <span class="btn-icon">🧺</span>
        <div>
          <div class="btn-label">Check Pantry</div>
          <div class="btn-desc">What's on hand & use-soon items</div>
        </div>
      </button>
      <button class="action-btn" onclick="sendRequest('surprise')">
        <span class="btn-icon">✨</span>
        <div>
          <div class="btn-label">Surprise Me</div>
          <div class="btn-desc">Something new from the pantry</div>
        </div>
      </button>
    </div>

    <div class="custom-input-section">
      <span class="custom-label">Ask anything</span>
      <div class="custom-input-row">
        <textarea id="customInput" placeholder="e.g. Recipe for the miso salmon…" rows="2"></textarea>
        <button class="send-btn" onclick="sendCustom()">↑</button>
      </div>
    </div>

    <div class="response-card" id="responseCard">
      <div class="response-header">
        <span class="response-title" id="responseTitle">Response</span>
        <div class="response-actions">
          <button class="resp-action-btn" onclick="copyResponse()">Copy</button>
          <button class="resp-action-btn" onclick="clearResponse()">Clear</button>
        </div>
      </div>
      <div class="response-body" id="responseBody"></div>
    </div>
  </div>

  <!-- ── MEAL PLAN VIEW ─────────────────────────────────── -->
  <div class="view" id="view-plan">
    <div class="plan-header">
      <div>
        <div class="plan-title">This Week</div>
        <div class="plan-subtitle">Tap a meal to see the recipe</div>
      </div>
      <button class="back-btn" onclick="showView('home')">← Home</button>
    </div>

    <div id="planLoading" class="loading">
      <div class="loading-dots"><span></span><span></span><span></span></div>
      Planning your week…
    </div>

    <div id="planCards"></div>

    <div class="plan-actions" id="planActions" style="display:none">
      <button class="plan-cta secondary" onclick="planWeek()">↺ Regenerate</button>
      <button class="plan-cta primary" onclick="getGroceryList()">🛒 Grocery List</button>
    </div>
  </div>

  <!-- ── RECIPE DETAIL VIEW ─────────────────────────────── -->
  <div class="view" id="view-recipe">
    <button class="back-btn" onclick="showView('plan')">← Back to plan</button>
    <div class="recipe-day-label" id="recipeDayLabel"></div>
    <div class="recipe-title" id="recipeTitle"></div>

    <div id="recipeLoading" class="loading" style="display:none">
      <div class="loading-dots"><span></span><span></span><span></span></div>
      Loading recipe…
    </div>

    <div class="recipe-body" id="recipeBody"></div>

    <div class="recipe-detail-actions" id="recipeActions" style="display:none">
      <button class="recipe-action-btn swap" onclick="swapMeal()">
        🔄 Find me a different meal for this night
      </button>
      <button class="recipe-action-btn keep" onclick="showView('plan')">
        ✓ Keep this — back to plan
      </button>
    </div>
  </div>

</main>

<footer>Antal Family Meals · Powered by Claude</footer>

<script>
  // ─── CONFIG ──────────────────────────────────────────────────────
  const PROXY_URL = 'https://family-meals-proxy.andrew-antal79.workers.dev';
  const SHEET_ID  = '1R432cBA83sJZ1yQgRpDjlHN-eJ40XUGiEYgYQN_UVfk';
  const PANTRY_CSV_URL  = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&sheet=Sheet1`;
  const STAPLES_CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&sheet=Staples`;

  const BASE_SYSTEM_PROMPT = `You are a meal planning assistant for the Antal household in Oak Park, IL (ZIP 60302).

HOUSEHOLD PROFILE:
- 2 adults, pescatarian (fish & shellfish fine, no meat). Vegetarian meals are equally valid — not every night needs fish.
- Cuisines: Mediterranean, Asian, Mexican
- Budget: under $150/week groceries
- Prep time: 30 min or less
- Structure: 3 cook nights + 2 leftover nights (leftovers repurposed creatively, not repeated)
- Planning priority: pantry-first. Use what's on hand before deciding what to buy.

BEHAVIOR:
- Never ask for preferences — they are defined above
- For meal plans: return structured JSON only (no explanation, no markdown fences)
- For grocery lists: cross-reference pantry + staples, show item + estimated price, show total
- For recipes: scale for 2, include ingredients, numbered steps, leftover repurposing note
- Use Oak Park IL prices for estimates`;

  // ─── STATE ───────────────────────────────────────────────────────
  let currentPlan = null;
  let currentMealIndex = null;
  let cachedSystemPrompt = null;

  // ─── PANTRY ──────────────────────────────────────────────────────
  async function fetchCSV(url) {
    try {
      const res = await fetch(url, { redirect: 'follow' });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const text = await res.text();
      return text?.trim().length ? text : null;
    } catch (err) {
      console.warn('CSV fetch failed:', err.message);
      return null;
    }
  }

  function parseCSV(csv) {
    if (!csv) return null;
    return csv.split('\n')
      .map(row => row.split(',').map(c => c.replace(/^"|"$/g, '').trim()))
      .filter(row => row.some(c => c.length));
  }

  function csvToReadable(rows, label) {
    if (!rows || rows.length < 2) return `${label}: (empty)`;
    const headers = rows[0];
    return `${label}:\n` + rows.slice(1).map(row =>
      headers.map((h, i) => `${h}: ${row[i] || ''}`).join(', ')
    ).join('\n');
  }

  async function buildSystemPrompt() {
    if (cachedSystemPrompt) return cachedSystemPrompt;
    const [pantryCSV, staplesCSV] = await Promise.all([
      fetchCSV(PANTRY_CSV_URL),
      fetchCSV(STAPLES_CSV_URL)
    ]);
    const pantryText  = csvToReadable(parseCSV(pantryCSV),  'ACTIVE PANTRY (Sheet1)');
    const staplesText = csvToReadable(parseCSV(staplesCSV), 'STAPLES (always assumed on hand)');
    cachedSystemPrompt = `${BASE_SYSTEM_PROMPT}

--- LIVE PANTRY DATA (fetched now) ---
${pantryText}

${staplesText}
--- END PANTRY DATA ---

Never add staples to the grocery list unless the user says they are out. Always build meals around active pantry items first.`;
    return cachedSystemPrompt;
  }

  // ─── CLAUDE CALL ─────────────────────────────────────────────────
  async function callClaude(messages, maxTokens = 2000) {
    const systemPrompt = await buildSystemPrompt();
    const res = await fetch(PROXY_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: maxTokens,
        system: systemPrompt,
        messages
      })
    });
    if (!res.ok) {
      const err = await res.json();
      throw new Error(err.error?.message || 'API error');
    }
    const data = await res.json();
    return data.content?.[0]?.text || '';
  }

  // ─── VIEW NAV ────────────────────────────────────────────────────
  function showView(name) {
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.getElementById(`view-${name}`).classList.add('active');
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  // ─── PLAN WEEK ───────────────────────────────────────────────────
  async function planWeek() {
    cachedSystemPrompt = null; // always re-fetch pantry for fresh plan
    showView('plan');
    document.getElementById('planLoading').style.display = 'flex';
    document.getElementById('planCards').innerHTML = '';
    document.getElementById('planActions').style.display = 'none';

    try {
      const raw = await callClaude([{
        role: 'user',
        content: `Plan this week's meals. Return ONLY a valid JSON array — no markdown, no explanation, nothing else.

The array must have exactly 5 objects: 3 cook nights and 2 leftover nights, spread across the week.

Each object must use exactly this shape:
{
  "day": "Monday",
  "type": "cook",
  "name": "Meal Name",
  "cuisine": "Mexican",
  "isVegetarian": false,
  "keyIngredients": "ingredient1, ingredient2, ingredient3",
  "leftoverOf": null
}

For leftover nights, set type to "leftover" and leftoverOf to the name of the cook meal it comes from.
Return the JSON array only.`
      }]);

      const clean = raw.replace(/```json|```/g, '').trim();
      currentPlan = JSON.parse(clean);
      renderPlanCards();

    } catch (err) {
      document.getElementById('planLoading').style.display = 'none';
      document.getElementById('planCards').innerHTML =
        `<div class="error-msg">⚠️ ${err.message}<br><small>Try again.</small></div>`;
    }
  }

  function renderPlanCards() {
    document.getElementById('planLoading').style.display = 'none';
    const container = document.getElementById('planCards');
    container.innerHTML = '';

    currentPlan.forEach((meal, i) => {
      if (meal.type === 'leftover') {
        container.innerHTML += `
          <div class="leftover-card">
            <div class="leftover-icon">♻️</div>
            <div>
              <div class="leftover-label">${meal.day} · Leftovers</div>
              <div class="leftover-name">${meal.name}</div>
            </div>
          </div>`;
      } else {
        const typeTag = meal.isVegetarian
          ? `<span class="meal-tag veggie">🌿 Vegetarian</span>`
          : `<span class="meal-tag fish">🐟 Fish</span>`;
        const cuisineTag = `<span class="meal-tag">${meal.cuisine}</span>`;

        container.innerHTML += `
          <div class="meal-card" onclick="viewRecipe(${i})">
            <div class="meal-card-inner">
              <div class="meal-day">${meal.day}</div>
              <div class="meal-info">
                <div class="meal-name">${meal.name}</div>
                <div class="meal-key-ingredients">${meal.keyIngredients}</div>
                <div class="meal-tags">${typeTag}${cuisineTag}</div>
              </div>
              <div class="meal-arrow">›</div>
            </div>
          </div>`;
      }
    });

    document.getElementById('planActions').style.display = 'flex';
  }

  // ─── VIEW RECIPE ─────────────────────────────────────────────────
  async function viewRecipe(index) {
    currentMealIndex = index;
    const meal = currentPlan[index];

    showView('recipe');
    document.getElementById('recipeDayLabel').textContent = `${meal.day} · ${meal.cuisine}`;
    document.getElementById('recipeTitle').textContent = meal.name;
    document.getElementById('recipeBody').innerHTML = '';
    document.getElementById('recipeActions').style.display = 'none';
    document.getElementById('recipeLoading').style.display = 'flex';

    try {
      const recipe = await callClaude([{
        role: 'user',
        content: `Give me the full recipe for "${meal.name}" (${meal.cuisine}, pescatarian, serves 2, 30 min or less).

Include:
## Ingredients
(bullet list)

## Steps
(numbered list)

## Leftover Idea
(one sentence on how to repurpose this as tomorrow's meal)

Be concise and practical. No preamble.`
      }]);

      document.getElementById('recipeLoading').style.display = 'none';
      document.getElementById('recipeBody').innerHTML = formatText(recipe);
      document.getElementById('recipeActions').style.display = 'flex';

    } catch (err) {
      document.getElementById('recipeLoading').style.display = 'none';
      document.getElementById('recipeBody').innerHTML =
        `<div class="error-msg">⚠️ ${err.message}</div>`;
    }
  }

  // ─── SWAP MEAL ───────────────────────────────────────────────────
  async function swapMeal() {
    const meal = currentPlan[currentMealIndex];

    document.getElementById('recipeBody').innerHTML = '';
    document.getElementById('recipeActions').style.display = 'none';
    document.getElementById('recipeLoading').style.display = 'flex';
    document.getElementById('recipeTitle').textContent = 'Finding an alternative…';
    document.getElementById('recipeDayLabel').textContent = meal.day;

    try {
      const otherMeals = currentPlan
        .filter((m, i) => i !== currentMealIndex && m.type === 'cook')
        .map(m => m.name).join(', ');

      // Step 1: get a new meal name
      const suggestion = await callClaude([{
        role: 'user',
        content: `Suggest a different ${meal.cuisine} pescatarian meal for ${meal.day} night to replace "${meal.name}".
Constraints: pantry-first, 30 min or less, serves 2, pescatarian (vegetarian is fine too).
Already on this week's plan — do not repeat these: ${otherMeals || 'none'}.
Return ONLY a JSON object, no markdown:
{"name": "Meal Name", "cuisine": "${meal.cuisine}", "isVegetarian": false, "keyIngredients": "ingredient1, ingredient2, ingredient3"}`
      }], 400);

      const clean = suggestion.replace(/```json|```/g, '').trim();
      const newMeal = JSON.parse(clean);
      newMeal.day = meal.day;
      newMeal.type = 'cook';
      newMeal.leftoverOf = null;

      // Update plan state
      currentPlan[currentMealIndex] = newMeal;

      // Update UI header immediately
      document.getElementById('recipeTitle').textContent = newMeal.name;
      document.getElementById('recipeDayLabel').textContent = `${newMeal.day} · ${newMeal.cuisine}`;

      // Step 2: fetch the recipe for the new meal
      const recipe = await callClaude([{
        role: 'user',
        content: `Give me the full recipe for "${newMeal.name}" (${newMeal.cuisine}, pescatarian, serves 2, 30 min or less).

Include:
## Ingredients
(bullet list)

## Steps
(numbered list)

## Leftover Idea
(one sentence on how to repurpose this as tomorrow's meal)

Be concise and practical. No preamble.`
      }]);

      document.getElementById('recipeLoading').style.display = 'none';
      document.getElementById('recipeBody').innerHTML = formatText(recipe);
      document.getElementById('recipeActions').style.display = 'flex';

    } catch (err) {
      document.getElementById('recipeLoading').style.display = 'none';
      document.getElementById('recipeBody').innerHTML =
        `<div class="error-msg">⚠️ ${err.message}</div>`;
    }
  }

  // ─── GROCERY LIST ────────────────────────────────────────────────
  async function getGroceryList() {
    showView('home');
    if (!currentPlan) {
      sendRequest('grocery');
      return;
    }
    const planSummary = currentPlan
      .filter(m => m.type === 'cook')
      .map(m => `${m.day}: ${m.name}`).join(', ');
    sendRequest('custom',
      `Generate a grocery list for this week's meals: ${planSummary}. Cross-reference the pantry and staples — only list what we actually need to buy. Show each item with an estimated price and a total at the end.`
    );
  }

  // ─── GENERAL REQUESTS ────────────────────────────────────────────
  const PRESETS = {
    grocery: "Generate a grocery list for this week. Cross-reference the pantry and staples first. Show each item with estimated price and a total.",
    pantry:  "What's currently in the pantry? Flag anything that should be used soon based on when it was added.",
    surprise:"Suggest one creative meal I can make mostly from what's already on hand. Give me the full recipe."
  };

  async function sendRequest(type, customMessage = null) {
    const message = customMessage || PRESETS[type];
    const titles = {
      grocery: '🛒 Grocery List',
      pantry:  '🧺 Pantry Check',
      surprise:'✨ Meal Idea',
      custom:  '💬 Response'
    };
    showLoading(titles[type] || titles.custom);
    try {
      const text = await callClaude([{ role: 'user', content: message }]);
      showResponse(titles[type] || titles.custom, text);
    } catch (err) {
      showError(err.message);
    }
  }

  function sendCustom() {
    const input = document.getElementById('customInput');
    const msg = input.value.trim();
    if (!msg) return;
    sendRequest('custom', msg);
    input.value = '';
  }

  document.getElementById('customInput').addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendCustom(); }
  });

  // ─── UI HELPERS ──────────────────────────────────────────────────
  function showLoading(title) {
    const card = document.getElementById('responseCard');
    document.getElementById('responseTitle').textContent = title;
    document.getElementById('responseBody').innerHTML = `
      <div class="loading">
        <div class="loading-dots"><span></span><span></span><span></span></div>
        Thinking…
      </div>`;
    card.classList.add('visible');
    card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }

  function showResponse(title, text) {
    document.getElementById('responseTitle').textContent = title;
    document.getElementById('responseBody').innerHTML = formatText(text);
  }

  function showError(msg) {
    document.getElementById('responseBody').innerHTML =
      `<div class="error-msg">⚠️ ${msg}<br><small>Check your connection and try again.</small></div>`;
  }

  function clearResponse() {
    document.getElementById('responseCard').classList.remove('visible');
  }

  function copyResponse() {
    navigator.clipboard.writeText(document.getElementById('responseBody').innerText).then(() => {
      const btn = event.target;
      btn.textContent = 'Copied!';
      setTimeout(() => btn.textContent = 'Copy', 1500);
    });
  }

  function formatText(text) {
    return text
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/^#{1,3} (.+)$/gm, '<h3>$1</h3>')
      .replace(/^\| (.+)$/gm, match => {
        if (match.includes('---')) return '';
        const cells = match.split('|').filter(c => c.trim());
        return '<tr>' + cells.map(c => `<td>${c.trim()}</td>`).join('') + '</tr>';
      })
      .replace(/(<tr>[\s\S]*?<\/tr>\n?)+/g, t => `<table>${t}</table>`)
      .replace(/^- (.+)$/gm, '<li>$1</li>')
      .replace(/^\d+\. (.+)$/gm, '<li>$1</li>')
      .replace(/(<li>.*<\/li>\n?)+/g, l => `<ul>${l}</ul>`)
      .replace(/\n\n/g, '</p><p>')
      .trim();
  }
</script>
